<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gestão de Projetos</title>
<link rel="icon" type="image/png" href="/hrpath-logo.png">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#F7F6F3;--surface:#FFFFFF;--surface2:#F0EEE9;
    --border:rgba(0,0,0,0.09);--border-md:rgba(0,0,0,0.14);
    --text:#1A1917;--muted:#6B6860;--hint:#A09E99;
    --purple:#534AB7;--purple-lt:#EEEDFE;--purple-dk:#26215C;
    --teal:#1D9E75;--teal-lt:#E1F5EE;--teal-dk:#04342C;
    --blue:#378ADD;--blue-lt:#E6F1FB;--blue-dk:#042C53;
    --red:#E24B4A;--red-lt:#FCEBEB;--red-dk:#501313;
    --amber:#BA7517;--amber-lt:#FAEEDA;
    --radius:10px;--radius-sm:6px;
    --shadow:0 1px 3px rgba(0,0,0,0.07),0 4px 16px rgba(0,0,0,0.04);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'DM Sans',sans-serif;background:url('/bg-hrpath.jpg') center/cover fixed;color:var(--text);min-height:100vh}

  /* ── HEADER ── */
  .app-header{background:var(--surface);border-bottom:1px solid var(--border);padding:0 28px;height:56px;display:flex;align-items:stretch;justify-content:space-between;position:sticky;top:0;z-index:50}
  .logo{display:flex;align-items:center;gap:10px;font-size:15px;font-weight:600;flex-shrink:0}
  .logo-icon{height:28px;display:flex;align-items:center}
  .logo-icon img{height:28px;width:auto}
  .tabs{display:flex;align-items:stretch;gap:0}
  .tab{display:flex;align-items:center;gap:7px;padding:0 20px;font-size:13px;font-weight:500;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;transition:color .15s,border-color .15s;position:relative;top:1px;white-space:nowrap}
  .tab:hover{color:var(--text)}
  .tab.active{color:var(--purple);border-bottom-color:var(--purple)}
  .sync-status{display:flex;align-items:center;font-size:12px;color:var(--hint);flex-shrink:0}

  /* ── MAIN ── */
  .main{padding:24px 28px;max-width:1300px;margin:0 auto}

  /* ── SUMMARY ── */
  .summary-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:12px;margin-bottom:20px}
  .stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;box-shadow:var(--shadow)}
  .stat-card .slabel{font-size:11px;font-weight:500;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px}
  .stat-card .svalue{font-size:26px;font-weight:600;line-height:1}

  /* ── TOOLBAR ── */
  .toolbar{display:flex;gap:10px;margin-bottom:14px;flex-wrap:wrap;align-items:center}
  .toolbar input[type=text]{flex:1;min-width:180px}
  input[type=text],input[type=date],input[type=number],select,textarea{height:36px;border:1px solid var(--border-md);border-radius:var(--radius-sm);background:var(--surface);color:var(--text);font-family:'DM Sans',sans-serif;font-size:13px;padding:0 12px;outline:none;transition:border-color .15s}
  input[type=text]:focus,input[type=date]:focus,input[type=number]:focus,select:focus,textarea:focus{border-color:var(--purple)}
  textarea{height:auto;padding:8px 12px;resize:vertical;line-height:1.6}
  .btn{height:36px;padding:0 16px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;cursor:pointer;border-radius:var(--radius-sm);border:1px solid var(--border-md);background:var(--surface);color:var(--text);display:inline-flex;align-items:center;gap:6px;transition:background .12s;white-space:nowrap}
  .btn:hover{background:var(--surface2)}
  .btn-primary{background:var(--purple);color:var(--purple-lt);border-color:var(--purple)}
  .btn-primary:hover{background:#3C3489}
  .btn-danger{background:var(--red-lt);color:var(--red-dk);border-color:rgba(226,75,74,.3)}
  .btn-danger:hover{background:#F7C1C1}
  .btn-sm{height:28px;padding:0 12px;font-size:12px}
  .year-range{display:flex;align-items:center;gap:6px;font-size:13px;color:#fff}
  .year-range select{width:84px;height:36px}

  /* ── CALENDAR PANEL ── */
  .panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden}
  .months-header{display:flex;background:var(--surface2);border-bottom:1px solid var(--border)}
  .label-col{min-width:165px;width:165px;flex-shrink:0;border-right:1px solid var(--border);padding:8px 14px;font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.06em}
  .months-row{flex:1;display:grid}
  .month-cell{font-size:11px;font-weight:500;color:var(--muted);text-align:center;padding:6px 0;border-right:1px solid var(--border);line-height:1.3}
  .month-cell:last-child{border-right:none}
  .month-cell.cur{color:var(--purple);font-weight:600}
  .month-cell.year-boundary{border-left:2px solid var(--border-md)}
  .row-wrap{border-top:1px solid var(--border)}
  .row-wrap:first-child{border-top:none}
  .project-header{display:flex;align-items:center;background:var(--surface2);border-bottom:1px solid var(--border);cursor:pointer;user-select:none}
  .project-header:hover{background:#E8E6E0}
  .project-name-cell{min-width:165px;width:165px;flex-shrink:0;border-right:1px solid var(--border);padding:6px 10px;display:flex;align-items:center;gap:5px}
  .collapse-arrow{font-size:10px;color:var(--hint);flex-shrink:0;transition:transform .2s;display:inline-block}
  .project-name{font-size:13px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1}
  .icon-btn{background:none;border:none;cursor:pointer;color:var(--hint);font-size:13px;padding:2px 3px;border-radius:4px;opacity:0;transition:opacity .1s,color .1s;flex-shrink:0;line-height:1}
  .project-header:hover .icon-btn{opacity:1}
  .icon-btn:hover{color:var(--purple)}
  .project-header-grid{flex:1;position:relative;height:34px}
  .segment-row{display:flex;align-items:center;min-height:38px;border-top:1px solid var(--border)}
  .segment-label-cell{min-width:165px;width:165px;flex-shrink:0;border-right:1px solid var(--border);padding:4px 10px 4px 22px;display:flex;align-items:center;gap:4px}
  .segment-label{font-size:12px;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1}
  .seg-edit-btn{background:none;border:none;cursor:pointer;color:var(--hint);font-size:12px;padding:2px;border-radius:3px;opacity:0;transition:opacity .1s,color .1s;flex-shrink:0}
  .segment-row:hover .seg-edit-btn{opacity:1}
  .seg-edit-btn:hover{color:var(--purple)}
  .segment-grid{flex:1;position:relative;height:38px}
  .grid-lines{position:absolute;inset:0;display:grid;pointer-events:none}
  .grid-line{border-right:1px solid var(--border)}
  .grid-line:last-child{border-right:none}
  .grid-line.cur-col{background:rgba(83,74,183,.035)}
  .grid-line.year-start{border-left:2px solid var(--border-md)}
  .today-line{position:absolute;top:0;bottom:0;width:1.5px;background:var(--red);opacity:.7;z-index:5;pointer-events:none}
  .bar{position:absolute;height:24px;top:7px;border-radius:5px;display:flex;align-items:center;padding:0 8px;font-size:11px;font-weight:500;cursor:pointer;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;z-index:3;transition:filter .12s}
  .bar:hover{filter:brightness(.9)}
  .bar-continues-left{border-radius:0 5px 5px 0}
  .bar-continues-right{border-radius:5px 0 0 5px}
  .bar-continues-both{border-radius:0}
  .bar::before{content:'◀';font-size:9px;opacity:.8;margin-right:3px;display:none;flex-shrink:0}
  .bar::after{content:'▶';font-size:9px;opacity:.8;margin-left:auto;padding-left:4px;display:none;flex-shrink:0}
  .bar-continues-left::before{display:inline}
  .bar-continues-right::after{display:inline}
  .bar-continues-both::before,.bar-continues-both::after{display:inline}
  .s-andamento{background:#AFA9EC;color:#26215C}
  .s-planejado{background:#85B7EB;color:#042C53}
  .s-concluido{background:#5DCAA5;color:#04342C}
  .s-atrasado{background:#F09595;color:#501313}
  .add-seg-row{display:flex;align-items:center;min-height:30px;border-top:1px dashed var(--border-md)}
  .add-seg-btn{margin:4px 0 4px 22px;height:22px;padding:0 10px;font-size:11px;cursor:pointer;border-radius:5px;border:1px dashed var(--border-md);background:transparent;color:var(--hint);font-family:'DM Sans',sans-serif;display:inline-flex;align-items:center;gap:4px}
  .add-seg-btn:hover{color:var(--purple);border-color:var(--purple);background:rgba(83,74,183,.05)}

  /* ── SCOPE TAB ── */
  .scope-layout{display:grid;grid-template-columns:240px 1fr;gap:16px;align-items:start}
  .project-list-panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden}
  .list-header{padding:12px 16px;border-bottom:1px solid var(--border);font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.06em}
  .list-search{padding:8px 10px;border-bottom:1px solid var(--border)}
  .list-search input{width:100%;height:28px;border:0.5px solid var(--border-md);border-radius:6px;background:var(--surface2);font-size:12px;padding:0 10px;color:var(--text);outline:none}
  .proj-list-item{padding:9px 14px;cursor:pointer;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:9px;transition:background .1s}
  .proj-list-item:last-child{border-bottom:none}
  .proj-list-item:hover{background:var(--surface2)}
  .proj-list-item.active{background:var(--purple-lt)}
  .proj-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
  .proj-list-name{font-size:13px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1;color:var(--text)}
  .proj-list-item.active .proj-list-name{color:var(--purple)}
  .proj-list-count{font-size:11px;color:var(--hint)}

  .scope-detail{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden}
  .scope-detail-header{padding:14px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:12px}
  .scope-detail-title{font-size:16px;font-weight:500}
  .scope-detail-sub{font-size:12px;color:var(--muted);margin-top:2px}
  .scope-detail-body{padding:20px 22px}
  .edit-banner{background:var(--purple-lt);border-bottom:1px solid rgba(83,74,183,.2);padding:8px 20px;font-size:12px;color:var(--purple);display:flex;align-items:center;gap:6px}

  .sec{margin-bottom:18px}
  .sec-title{font-size:11px;font-weight:500;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;margin-bottom:10px;display:flex;align-items:center;gap:5px}
  .ig3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:8px}
  .ig2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
  .icard{background:var(--surface2);border-radius:var(--radius-sm);padding:9px 12px}
  .ilabel{font-size:11px;color:var(--muted);margin-bottom:3px}
  .ivalue{font-size:13px;font-weight:500;color:var(--text);display:flex;align-items:center;gap:5px}
  .desc-box{background:var(--surface2);border-radius:var(--radius-sm);padding:11px 14px;font-size:13px;color:var(--muted);line-height:1.6}
  .divider{height:1px;background:var(--border);margin:16px 0}

  .badge{font-size:11px;padding:3px 9px;border-radius:20px;font-weight:500;white-space:nowrap}
  .b-andamento{background:var(--purple-lt);color:var(--purple)}
  .b-planejado{background:var(--blue-lt);color:var(--blue-dk)}
  .b-concluido{background:var(--teal-lt);color:var(--teal-dk)}
  .b-atrasado{background:var(--red-lt);color:var(--red-dk)}

  .prio-alta{color:var(--red)}
  .prio-media{color:var(--amber)}
  .prio-baixa{color:var(--teal)}
  .prio-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}

  .orc-box{background:var(--surface2);border-radius:var(--radius-sm);padding:12px 14px}
  .orc-row{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:10px}
  .orc-value{font-size:17px;font-weight:500}
  .prog-bg{height:6px;background:var(--border-md);border-radius:3px;overflow:hidden}
  .prog-fill{height:100%;border-radius:3px}
  .prog-labels{display:flex;justify-content:space-between;font-size:11px;color:var(--muted);margin-top:4px}

  .risk-list{display:flex;flex-direction:column;gap:7px}
  .risk-item{display:flex;align-items:flex-start;gap:9px;padding:9px 12px;border-radius:var(--radius-sm);border:1px solid var(--border)}
  .risk-badge{font-size:10px;padding:2px 7px;border-radius:10px;font-weight:500;white-space:nowrap;flex-shrink:0;margin-top:1px}
  .rb-alto{background:var(--red-lt);color:#A32D2D}
  .rb-medio{background:var(--amber-lt);color:#854F0B}
  .rb-baixo{background:var(--teal-lt);color:#0F6E56}
  .risk-text{font-size:13px;color:var(--text);line-height:1.4;flex:1}

  .obj-list{display:flex;flex-direction:column;gap:7px}
  .obj-item{display:flex;align-items:center;gap:9px;font-size:13px}
  .obj-item.done{color:var(--text)}
  .obj-item.pending{color:var(--muted)}
  .obj-check{width:16px;height:16px;border-radius:50%;border:1.5px solid var(--border-md);display:flex;align-items:center;justify-content:center;flex-shrink:0}
  .obj-item.done .obj-check{background:var(--teal);border-color:var(--teal);color:#fff;font-size:10px}

  .team-list{display:flex;flex-direction:column;gap:7px}
  .team-member{display:flex;align-items:center;gap:9px;padding:7px 10px;border:1px solid var(--border);border-radius:var(--radius-sm)}
  .avatar{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:500;flex-shrink:0;background:var(--purple-lt);color:var(--purple)}
  .member-info{flex:1}
  .member-name{font-size:13px;font-weight:500}
  .member-role{font-size:11px;color:var(--muted)}
  .member-remove{background:none;border:none;cursor:pointer;color:var(--hint);font-size:13px;padding:3px;border-radius:4px;display:flex;align-items:center;line-height:1}
  .member-remove:hover{color:var(--red);background:var(--red-lt)}

  .add-team-btn{display:flex;align-items:center;gap:7px;padding:7px 12px;border:1px dashed var(--border-md);border-radius:var(--radius-sm);background:transparent;cursor:pointer;font-size:13px;color:var(--muted);font-family:'DM Sans',sans-serif;width:100%;transition:all .15s;margin-top:8px}
  .add-team-btn:hover{color:var(--purple);border-color:var(--purple);background:var(--purple-lt)}

  .team-search-box{background:var(--surface);border:1px solid var(--border-md);border-radius:var(--radius-sm);overflow:hidden;margin-top:8px}
  .team-search-input{display:flex;align-items:center;gap:8px;padding:8px 12px;border-bottom:1px solid var(--border)}
  .team-search-input input{border:none;background:transparent;font-size:13px;color:var(--text);outline:none;flex:1;font-family:'DM Sans',sans-serif;height:auto;padding:0}
  .team-search-result{display:flex;align-items:center;gap:9px;padding:7px 12px;cursor:pointer;transition:background .1s;font-size:13px}
  .team-search-result:hover{background:var(--surface2)}
  .team-add-manual{padding:10px 12px;border-top:1px solid var(--border)}
  .team-add-manual-row{display:grid;grid-template-columns:1fr 1fr auto;gap:8px;align-items:center}
  .team-add-manual input{height:30px;font-size:12px;padding:0 8px}
  .team-add-manual button{height:30px;padding:0 12px;font-size:12px}

  /* EDIT FORM */
  .field{margin-bottom:12px}
  .field label{display:block;font-size:11px;font-weight:500;color:var(--muted);margin-bottom:4px;text-transform:uppercase;letter-spacing:.05em}
  .field input,.field select{width:100%;height:34px;padding:0 10px}
  .field textarea{width:100%;height:72px;padding:8px 10px}
  .field-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .field-row-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
  .obj-edit-row{display:flex;align-items:center;gap:8px;margin-bottom:7px}
  .obj-edit-row input[type=checkbox]{width:15px;height:15px;accent-color:var(--purple);flex-shrink:0}
  .obj-edit-row input[type=text]{flex:1;height:30px;font-size:12px;padding:0 8px}
  .obj-edit-row button{background:none;border:none;cursor:pointer;color:var(--hint);font-size:14px;padding:3px;line-height:1}
  .obj-edit-row button:hover{color:var(--red)}
  .risk-edit-row{display:flex;align-items:center;gap:8px;margin-bottom:7px}
  .risk-edit-row select{width:90px;height:30px;font-size:12px;padding:0 6px;flex-shrink:0}
  .risk-edit-row input{flex:1;height:30px;font-size:12px;padding:0 8px}
  .risk-edit-row button{background:none;border:none;cursor:pointer;color:var(--hint);font-size:14px;padding:3px;line-height:1}
  .risk-edit-row button:hover{color:var(--red)}
  .add-row-btn{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border:1px dashed var(--border-md);border-radius:var(--radius-sm);background:transparent;cursor:pointer;font-size:12px;color:var(--muted);font-family:'DM Sans',sans-serif;transition:all .15s}
  .add-row-btn:hover{color:var(--purple);border-color:var(--purple)}

  /* MODAL */
  .overlay{display:none;position:fixed;inset:0;background:rgba(20,18,15,.45);z-index:200;align-items:center;justify-content:center}
  .overlay.open{display:flex}
  .modal{background:var(--surface);border-radius:var(--radius);border:1px solid var(--border-md);box-shadow:0 8px 40px rgba(0,0,0,.18);padding:28px;width:400px;max-width:94vw}
  .modal-title{font-size:16px;font-weight:600;margin-bottom:18px}
  .modal-actions{display:flex;justify-content:space-between;align-items:center;margin-top:16px;padding-top:14px;border-top:1px solid var(--border)}

  /* LEGEND */
  .legend{display:flex;gap:18px;flex-wrap:wrap;padding:12px 16px;background:var(--surface);border-radius:var(--radius);box-shadow:var(--shadow);margin-top:8px}
  .legend-item{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--muted)}
  .legend-dot{width:10px;height:10px;border-radius:3px}

  #view-scope .main{background:var(--surface);border-radius:var(--radius);box-shadow:var(--shadow);margin-top:16px;margin-bottom:16px}
  .state-msg{padding:48px;text-align:center;font-size:14px;color:var(--hint)}
  .error-msg{padding:16px 20px;font-size:13px;color:var(--red);background:var(--red-lt);border-radius:var(--radius-sm);margin-bottom:14px}

  .toast{position:fixed;bottom:24px;right:24px;background:var(--text);color:#F7F6F3;font-size:13px;padding:10px 18px;border-radius:var(--radius-sm);opacity:0;pointer-events:none;transition:opacity .2s;z-index:999}
  .toast.show{opacity:1}
  .toast.err{background:var(--red)}
  
  .drag-handle {
    cursor: grab;
    color: var(--hint);
    font-size: 14px;
    padding: 0 3px;
    opacity: 0;
    transition: opacity .1s;
    flex-shrink: 0;
    line-height: 1;
    user-select: none;
  }
  .project-header:hover .drag-handle { opacity: 1; }
  .drag-handle:active { cursor: grabbing; }
  .dragging-row { opacity: 0.4; }
  .drag-over-top { border-top: 2px solid var(--purple) !important; }
  .drag-over-bottom { border-bottom: 2px solid var(--purple) !important; }
</style>
</head>
<body>

<!-- TELA DE LOGIN -->
<div id="login-screen" style="display:none;position:fixed;inset:0;background:rgba(5,25,65,0.45);z-index:1000;align-items:center;justify-content:center">
  <div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);padding:36px;width:360px;max-width:94vw">
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:28px">
      <img src="/hrpath-logo.png" alt="HR Path" style="height:36px;width:auto">
    </div>
    <div id="login-error" style="display:none;background:var(--red-lt);color:var(--red);padding:10px 14px;border-radius:var(--radius-sm);font-size:13px;margin-bottom:14px"></div>
    <div class="field"><label>Usuário</label><input type="email" id="login-email" placeholder="Seu usuário" style="width:100%" onkeydown="if(event.key==='Enter')doLogin()"></div>
    <div class="field"><label>Senha</label><input type="password" id="login-password" placeholder="Sua senha" style="width:100%" onkeydown="if(event.key==='Enter')doLogin()"></div>
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:16px">
      <input type="checkbox" id="login-remember" style="width:15px;height:15px;accent-color:var(--purple)">
      <label for="login-remember" style="font-size:13px;color:var(--muted);cursor:pointer">Lembrar neste dispositivo por 30 dias</label>
    </div>

<script>
const API = '/api';
const today = new Date();
const Y = today.getFullYear();
const MONTHS = ['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
const SC = {'em andamento':'s-andamento','planejado':'s-planejado','concluído':'s-concluido','atrasado':'s-atrasado'};
const BADGE = {'em andamento':'b-andamento','planejado':'b-planejado','concluído':'b-concluido','atrasado':'b-atrasado'};
const STATUS_LABEL = {'em andamento':'Em andamento','planejado':'Planejado','concluído':'Concluído','atrasado':'Atrasado'};
const PRIO = {alta:{label:'Alta',cls:'prio-alta',dot:'#E24B4A'},media:{label:'Média',cls:'prio-media',dot:'#BA7517'},baixa:{label:'Baixa',cls:'prio-baixa',dot:'#1D9E75'}};
const RISK_LABEL = {alto:'Alto',medio:'Médio',baixo:'Baixo'};
const MIN_YEAR = Y-3, MAX_YEAR = Y+5;

let projects = [];
let scopes = [];
let collapsed = new Set();
let initialCollapse = false;
let viewStart = Y, viewEnd = Y;
let currentTab = 'cal';
let currentScopeProject = null;
let scopeEditing = false;
let scopeEditState = {};
let scopeSearchOpen = false;

// ── API ──
async function apiFetch(path, opts={}) {
  const token = localStorage.getItem('token') || sessionStorage.getItem('token');
  const res = await fetch(API+path, {
    headers: { 'Content-Type': 'application/json', ...(token ? { Authorization: `Bearer ${token}` } : {}) },
    ...opts
  });
  if (res.status === 401) { doLogout(); return; }
  if (!res.ok) { const e = await res.json().catch(()=>({error:'Erro'})); throw new Error(e.error||res.statusText); }
  return res.json();
}

// ── INIT ──
async function load() {
  setSyncStatus('Sincronizando...');
  try {
    projects = await apiFetch('/projects');
    if (!initialCollapse) { projects.forEach(p=>collapsed.add(p.id)); initialCollapse=true; }
    await loadScopes();
    // Garante que a aba calendário está visível e renderiza
    document.getElementById('view-cal').style.display = '';
    document.getElementById('view-scope').style.display = 'none';
    document.getElementById('view-users').style.display = 'none';
    document.getElementById('tab-cal').classList.add('active');
    document.getElementById('tab-scope').classList.remove('active');
    currentTab = 'cal';
    calRender();
    setSyncStatus('');
  } catch(e) {
    document.getElementById('error-banner').innerHTML = `<div class="error-msg">Erro ao conectar: ${e.message}</div>`;
    document.getElementById('cal-panel').innerHTML = '<div class="state-msg">Erro ao carregar.</div>';
    setSyncStatus('⚠ Offline');
  }
}

async function loadScopes() {
  scopes = await apiFetch('/scopes');
}

// ── TAB ──
function switchTab(tab) {
  currentTab = tab;
  document.getElementById('tab-cal').classList.toggle('active', tab==='cal');
  document.getElementById('tab-scope').classList.toggle('active', tab==='scope');
  document.getElementById('view-cal').style.display   = tab==='cal'   ? '' : 'none';
  document.getElementById('view-scope').style.display = tab==='scope' ? '' : 'none';
  document.getElementById('view-users').style.display = tab==='users' ? '' : 'none';
  if (tab==='scope') { scopeRenderList(); if(currentScopeProject) scopeRenderDetail(); }
  if (tab==='users' && currentUser?.role === 'admin') loadUsers();
  else if (tab==='users') { switchTab('cal'); return; }
}

// ══════════════════════════════════════════
// CALENDAR TAB
// ══════════════════════════════════════════

// ── DRAG & DROP (projetos) ──
let dragSrc = null;

function onDragStart(e, id) {
  dragSrc = id;
  e.dataTransfer.effectAllowed = 'move';
  setTimeout(() => e.currentTarget.closest('.row-wrap').classList.add('dragging-row'), 0);
}

function onDragEnd(e) {
  document.querySelectorAll('.dragging-row,.drag-over-top,.drag-over-bottom')
    .forEach(el => el.classList.remove('dragging-row','drag-over-top','drag-over-bottom'));
}

function onDragOver(e, id) {
  if (dragSrc === id) return;
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
  const el = e.currentTarget.closest('.row-wrap');
  document.querySelectorAll('.drag-over-top,.drag-over-bottom')
    .forEach(x => x.classList.remove('drag-over-top','drag-over-bottom'));
  const rect = el.getBoundingClientRect();
  el.classList.add(e.clientY < rect.top + rect.height / 2 ? 'drag-over-top' : 'drag-over-bottom');
}

function onDrop(e, targetId) {
  e.preventDefault();
  if (dragSrc === targetId) return;
  document.querySelectorAll('.drag-over-top,.drag-over-bottom')
    .forEach(el => el.classList.remove('drag-over-top','drag-over-bottom'));

  const el = e.currentTarget.closest('.row-wrap');
  const rect = el.getBoundingClientRect();
  const insertBefore = e.clientY < rect.top + rect.height / 2;

  const ids = projects.map(p => p.id);
  const fromIdx = ids.indexOf(dragSrc);
  ids.splice(fromIdx, 1);
  const toIdx = insertBefore ? ids.indexOf(targetId) : ids.indexOf(targetId) + 1;
  ids.splice(toIdx, 0, dragSrc);
  projects = ids.map(id => projects.find(p => p.id === id));
  calRender();

  apiFetch('/projects/reorder', { method:'PUT', body:JSON.stringify({ids}) })
    .catch(() => toast('Erro ao salvar ordem.', true));
}

// ── USERS ──
let users = [];

async function loadUsers() {
  if (currentUser?.role !== 'admin') { switchTab('cal'); return; }
  document.getElementById('users-panel').innerHTML = '<div class="state-msg">Carregando...</div>';
  try {
    users = await apiFetch('/auth/users');
    renderUsers();
  } catch(e) { document.getElementById('users-panel').innerHTML = `<div class="error-msg">${e.message}</div>`; }
}

function renderUsers() {
  if (!users.length) {
    document.getElementById('users-panel').innerHTML = '<div class="state-msg">Nenhum usuário cadastrado.</div>';
    return;
  }
  const rows = users.map(u => `
    <tr style="border-bottom:1px solid var(--border)">
      <td style="padding:12px 16px"><div style="font-size:13px;font-weight:500">${esc(u.name)}</div></td>
      <td style="padding:12px 16px;font-size:13px;color:var(--muted)">${esc(u.email)}</td>
      <td style="padding:12px 16px"><span class="badge ${u.role==='admin'?'b-andamento':'b-planejado'}">${u.role==='admin'?'Admin':'Usuário'}</span></td>
      <td style="padding:12px 16px"><span class="badge ${u.active?'b-concluido':'b-atrasado'}">${u.active?'Ativo':'Inativo'}</span></td>
      <td style="padding:12px 16px">
        <div style="display:flex;gap:6px;justify-content:flex-end">
          <button class="btn btn-sm" onclick="openUserModal(${u.id})">✎ Editar</button>
          ${u.id !== currentUser.id ? `<button class="btn btn-sm btn-danger" onclick="deleteUser(${u.id})">✕</button>` : ''}
        </div>
      </td>
    </tr>`).join('');
  document.getElementById('users-panel').innerHTML = `
    <table style="width:100%;border-collapse:collapse">
      <thead>
        <tr style="background:var(--surface2);border-bottom:1px solid var(--border)">
          <th style="padding:10px 16px;text-align:left;font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.06em">Nome</th>
          <th style="padding:10px 16px;text-align:left;font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.06em">Email</th>
          <th style="padding:10px 16px;text-align:left;font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.06em">Perfil</th>
          <th style="padding:10px 16px;text-align:left;font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.06em">Status</th>
          <th style="padding:10px 16px"></th>
        </tr>
      </thead>
      <tbody>${rows}</tbody>
    </table>`;
}

function openUserModal(uid) {
  const u = uid ? users.find(x => x.id === uid) : null;
  modal(`${u ? 'Editar' : 'Novo'} usuário`, `
    <div class="field"><label>Nome</label><input type="text" id="u-name" value="${u?esc(u.name):''}" placeholder="Nome completo" style="width:100%"></div>
    <div class="field"><label>Email</label><input type="email" id="u-email" value="${u?esc(u.email):''}" placeholder="email@empresa.com" style="width:100%"></div>
    <div class="field"><label>${u?'Nova senha (deixe em branco para manter)':'Senha'}</label><input type="password" id="u-password" placeholder="${u?'••••••••':'Mínimo 6 caracteres'}" style="width:100%"></div>
    <div class="field-row">
      <div class="field" style="margin:0"><label>Perfil</label>
        <select id="u-role" style="width:100%;height:34px">
          <option value="user" ${u&&u.role==='user'?'selected':''}>Usuário</option>
          <option value="admin" ${u&&u.role==='admin'?'selected':''}>Admin</option>
        </select>
      </div>
      <div class="field" style="margin:0"><label>Status</label>
        <select id="u-active" style="width:100%;height:34px">
          <option value="1" ${!u||u.active?'selected':''}>Ativo</option>
          <option value="0" ${u&&!u.active?'selected':''}>Inativo</option>
        </select>
      </div>
    </div>`,
    `<div></div>
     <div style="display:flex;gap:8px">
       <button class="btn" onclick="closeModal()">Cancelar</button>
       <button class="btn btn-primary" onclick="saveUser(${uid||'null'})">Salvar</button>
     </div>`
  );
  setTimeout(() => document.getElementById('u-name').focus(), 50);
}

async function saveUser(uid) {
  const name     = document.getElementById('u-name').value.trim();
  const email    = document.getElementById('u-email').value.trim();
  const password = document.getElementById('u-password').value;
  const role     = document.getElementById('u-role').value;
  const active   = parseInt(document.getElementById('u-active').value);
  if (!name || !email) return;
  if (!uid && !password) { toast('Senha obrigatória para novo usuário.', true); return; }
  setSyncStatus('Salvando...');
  try {
    const body = { name, email, role, active, ...(password ? { password } : {}) };
    if (uid) {
      const u = await apiFetch(`/auth/users/${uid}`, { method:'PUT', body:JSON.stringify(body) });
      users = users.map(x => x.id === uid ? u : x);
    } else {
      const u = await apiFetch('/auth/users', { method:'POST', body:JSON.stringify(body) });
      users.push(u);
    }
    closeModal(); renderUsers(); toast('Usuário salvo.');
  } catch(e) { toast(e.message, true); }
  setSyncStatus('');
}

async function deleteUser(uid) {
  if (!confirm('Excluir este usuário?')) return;
  setSyncStatus('Salvando...');
  try {
    await apiFetch(`/auth/users/${uid}`, { method:'DELETE' });
    users = users.filter(x => x.id !== uid);
    renderUsers(); toast('Usuário excluído.');
  } catch(e) { toast(e.message, true); }
  setSyncStatus('');
}

// ── AUTH ──
let currentUser = null;

async function checkAuth() {
  const token = localStorage.getItem('token') || sessionStorage.getItem('token');
  if (!token) { showLogin(); return; }
  try {
    const res = await fetch('/api/auth/me', { headers: { Authorization: `Bearer ${token}` } });
    if (!res.ok) throw new Error();
    const data = await res.json();
    currentUser = data.user;
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('view-cal').style.display = '';
    const ui = document.getElementById('user-info');
    ui.style.display = 'flex';
    ui.innerHTML = `
      <span style="color:var(--muted)">${currentUser.name}</span>
      ${currentUser.role==='admin'?'<button class="btn btn-sm" onclick="switchTab(\'users\')">Usuários</button>':''}
      <button class="btn btn-sm" onclick="doLogout()">Sair</button>`;
    load();
  } catch {
    localStorage.removeItem('token');
    sessionStorage.removeItem('token');
    showLogin();
  }
}

function showLogin() {
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('view-cal').style.display = 'none';
  document.getElementById('view-scope').style.display = 'none';
  document.getElementById('view-users').style.display = 'none';
  setTimeout(() => document.getElementById('login-email').focus(), 50);
}

async function doLogin() {
  const email = document.getElementById('login-email').value.trim();
  const password = document.getElementById('login-password').value;
  const remember = document.getElementById('login-remember').checked;
  const errEl = document.getElementById('login-error');
  errEl.style.display = 'none';
  if (!email || !password) { errEl.textContent = 'Preencha email e senha.'; errEl.style.display = 'block'; return; }
  try {
    const res = await fetch('/api/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password, remember })
    });
    const data = await res.json();
    if (!res.ok) { errEl.textContent = data.error; errEl.style.display = 'block'; return; }
    if (remember) localStorage.setItem('token', data.token);
    else sessionStorage.setItem('token', data.token);
    currentUser = data.user;
    document.getElementById('login-screen').style.display = 'none';
    checkAuth();
  } catch { errEl.textContent = 'Erro ao conectar.'; errEl.style.display = 'block'; }
}

function doLogout() {
  localStorage.removeItem('token'); sessionStorage.removeItem('token');
  currentUser = null;
  const ui = document.getElementById('user-info');
  if(ui){ ui.style.display='none'; ui.innerHTML=''; }
  showLogin();
}

function initYearSelectors() {
  ['year-start','year-end'].forEach(id => {
    const sel = document.getElementById(id); sel.innerHTML='';
    for(let y=MIN_YEAR; y<=MAX_YEAR; y++) { const o=document.createElement('option'); o.value=y; o.textContent=y; sel.appendChild(o); }
  });
  document.getElementById('year-start').value = viewStart;
  document.getElementById('year-end').value = viewEnd;
}
function onYearChange(which) {
  let s=parseInt(document.getElementById('year-start').value);
  let e=parseInt(document.getElementById('year-end').value);
  if(which==='start'&&s>e){e=s;document.getElementById('year-end').value=e;}
  if(which==='end'&&e<s){s=e;document.getElementById('year-start').value=s;}
  viewStart=s; viewEnd=e; calRender();
}
function tStart(){return new Date(viewStart,0,1);}
function tEnd(){return new Date(viewEnd,11,31);}
function tDays(){return(tEnd()-tStart())/86400000;}
function pct(d){const[y,m,day]=d.split('-').map(Number);const dt=new Date(y,m-1,day);return(dt-tStart())/86400000/tDays()*100;}
function fixDate(v){if(!v)return'';const d=new Date(v);return isNaN(d)?v:d.toISOString().split('T')[0];}
function fmtDate(d){if(!d)return'';const[y,m,dd]=d.split('-');const ms=['jan','fev','mar','abr','mai','jun','jul','ago','set','out','nov','dez'];return`${parseInt(dd)} ${ms[parseInt(m)-1]} ${y}`;}
function fmt(n){return'R$ '+Number(n||0).toLocaleString('pt-BR');}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function initials(name){
  const local=(name||'?').split('@')[0]; // pega só a parte antes do @
  return local.split('.').map(w=>w[0]).join('').slice(0,2).toUpperCase();
}

function calRender() {
  const q=document.getElementById('cal-search').value.toLowerCase();
  const fs=document.getElementById('cal-fstatus').value;
  const filtered=projects.filter(p=>{
    if(q&&!p.name.toLowerCase().includes(q))return false;
    if(fs&&!p.segments.some(s=>s.status===fs))return false;
    return true;
  });
  calRenderSummary(filtered);
  const numY=viewEnd-viewStart+1, totalCols=numY*12;
  const curY=today.getFullYear(), curM=today.getMonth();
  const gs=`grid-template-columns:repeat(${totalCols},1fr)`;
  let mCells='';
  for(let y=viewStart;y<=viewEnd;y++) for(let m=0;m<12;m++) {
    const isCur=y===curY&&m===curM, isYB=m===0&&y>viewStart;
    mCells+=`<div class="month-cell${isCur?' cur':''}${isYB?' year-boundary':''}">${MONTHS[m]}${numY>1?`<br><span style="font-size:9px;opacity:.55">${y}</span>`:''}</div>`;
  }
  const gl=Array.from({length:totalCols},(_,i)=>{
    const y=viewStart+Math.floor(i/12),m=i%12;
    const isCur=y===curY&&m===curM,isYS=m===0&&y>viewStart;
    return`<div class="grid-line${isCur?' cur-col':''}${isYS?' year-start':''}"></div>`;
  }).join('');
  const todayRaw=(today-tStart())/86400000/tDays()*100;
  const tl=(todayRaw>=0&&todayRaw<=100)?`<div class="today-line" style="left:${todayRaw.toFixed(2)}%"></div>`:'';
  let html=`<div class="months-header"><div class="label-col">Projeto</div><div class="months-row" style="${gs}">${mCells}</div></div>`;
  if(!filtered.length){html+='<div class="state-msg">Nenhum projeto encontrado.</div>';document.getElementById('cal-panel').innerHTML=html;return;}
  filtered.forEach(p=>{
    const isC=collapsed.has(p.id);
    const segs=fs?p.segments.filter(s=>s.status===fs):p.segments;
    html+=`<div class="row-wrap"
      draggable="true"
      ondragstart="onDragStart(event,${p.id})"
      ondragend="onDragEnd(event)"
      ondragover="onDragOver(event,${p.id})"
      ondrop="onDrop(event,${p.id})">
      <div class="project-header" onclick="toggleCollapse(${p.id})">
        <div class="project-name-cell">
          <span class="drag-handle" draggable="false" onclick="event.stopPropagation()">⠿</span>
          <span class="collapse-arrow" style="transform:rotate(${isC?'0':'90'}deg)">▶</span>
          <span class="project-name" title="${esc(p.name)}">${esc(p.name)}</span>
          <button class="icon-btn" onclick="event.stopPropagation();openProjectModal(${p.id})">✎</button>
          <button class="icon-btn" onclick="event.stopPropagation();deleteProject(${p.id})">✕</button>
        </div>
      <div class="project-header-grid"><div class="grid-lines" style="${gs}">${gl}</div>${tl}</div>
    </div>`;
    if(!isC){
      segs.forEach(s=>{
        const rawL=pct(s.start_date),rawR=pct(s.end_date);
        if(rawR<0||rawL>100)return;
        const sl=Math.max(0,rawL),er=Math.min(100,rawR),w=Math.max(er-sl,.5);
        const cL=rawL<0,cR=rawR>100;
        let rc=cL&&cR?'bar-continues-both':cL?'bar-continues-left':cR?'bar-continues-right':'';
        html+=`<div class="segment-row">
          <div class="segment-label-cell"><span class="segment-label" title="${esc(s.label)}">↳ ${esc(s.label)}</span><button class="seg-edit-btn" onclick="openSegModal(${p.id},${s.id})">✎</button></div>
          <div class="segment-grid"><div class="grid-lines" style="${gs}">${gl}</div>${tl}
            <div class="bar ${SC[s.status]||'s-planejado'} ${rc}" style="left:${sl.toFixed(3)}%;width:${w.toFixed(3)}%" onclick="openSegModal(${p.id},${s.id})" title="${esc(s.label)}: ${s.start_date} → ${s.end_date}">${esc(s.label)}</div>
          </div></div>`;
      });
      html+=`<div class="add-seg-row"><button class="add-seg-btn" onclick="openSegModal(${p.id},null)">+ adicionar bloco</button></div>`;
    }
    html+=`</div>`;
  });

}

// ── PROJECT MODAL ──
function openProjectModal(pid) {
  const p=pid?projects.find(x=>x.id===pid):null;
  modal(`${p?'Renomear':'Novo'} projeto`,
    `<div class="field"><label>Nome</label><input type="text" id="m-name" value="${p?esc(p.name):''}" placeholder="Ex: Lançamento do produto"></div>`,
    `<div></div><div style="display:flex;gap:8px"><button class="btn" onclick="closeModal()">Cancelar</button><button class="btn btn-primary" onclick="saveProject(${pid||'null'})">Salvar</button></div>`
  );
  setTimeout(()=>document.getElementById('m-name').focus(),50);
}
async function saveProject(pid) {
  const name=document.getElementById('m-name').value.trim();
  if(!name)return;
  setSyncStatus('Salvando...');
  try {
    if(pid){
      const u=await apiFetch(`/projects/${pid}`,{method:'PUT',body:JSON.stringify({name})});
      projects=projects.map(p=>p.id===pid?{...p,name:u.name}:p);
      const si=scopes.findIndex(s=>s.project_id===pid);
      if(si>=0)scopes[si].project_name=u.name;
    } else {
      const c=await apiFetch('/projects',{method:'POST',body:JSON.stringify({name})});
      c.segments=[]; projects.push(c); collapsed.add(c.id);
      scopes.push({project_id:c.id,project_name:c.name,scope:null});
    }
    closeModal(); calRender(); if(currentTab==='scope')scopeRenderList();
    toast('Projeto salvo.');
  } catch(e){toast(e.message,true);}
  setSyncStatus('');
}
async function deleteProject(pid) {
  if(!confirm('Excluir este projeto e todos os seus dados?'))return;
  setSyncStatus('Salvando...');
  try {
    await apiFetch(`/projects/${pid}`,{method:'DELETE'});
    projects=projects.filter(p=>p.id!==pid);
    scopes=scopes.filter(s=>s.project_id!==pid);
    collapsed.delete(pid);
    if(currentScopeProject===pid){currentScopeProject=null;document.getElementById('scope-detail').innerHTML='<div class="state-msg">Selecione um projeto</div>';}
    calRender(); if(currentTab==='scope')scopeRenderList();
    toast('Projeto excluído.');
  } catch(e){toast(e.message,true);}
  setSyncStatus('');
}

// ── SEGMENT MODAL ──
function openSegModal(pid,sid) {
  const p=projects.find(x=>x.id===pid);
  const s=sid?p.segments.find(x=>x.id===sid):null;
  const sv=s?fixDate(s.start_date):'', ev=s?fixDate(s.end_date):'';
  modal(`${s?'Editar':'Novo'} bloco${s?'':' — '+esc(p.name)}`,
    `<div class="field"><label>Rótulo</label><input type="text" id="m-label" value="${s?esc(s.label):''}" placeholder="Ex: Sprint 1..."></div>
     <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
       <div class="field" style="margin:0"><label>Início</label><input type="date" id="m-start" value="${sv}" style="width:100%"></div>
       <div class="field" style="margin:0"><label>Fim</label><input type="date" id="m-end" value="${ev}" style="width:100%"></div>
     </div>
     <div class="field" style="margin-top:12px"><label>Status</label><select id="m-status" style="width:100%">${['planejado','em andamento','concluído','atrasado'].map(v=>`<option value="${v}"${s&&s.status===v?' selected':''}>${v[0].toUpperCase()+v.slice(1)}</option>`).join('')}</select></div>`,
    `<div>${s?`<button class="btn btn-danger btn-sm" onclick="deleteSeg(${pid},${sid})">Excluir</button>`:'<span></span>'}</div>
     <div style="display:flex;gap:8px"><button class="btn" onclick="closeModal()">Cancelar</button><button class="btn btn-primary" onclick="saveSeg(${pid},${sid||'null'})">Salvar</button></div>`
  );
  setTimeout(()=>document.getElementById('m-label').focus(),50);
}
async function saveSeg(pid,sid) {
  const label=document.getElementById('m-label').value.trim();
  const start_date=document.getElementById('m-start').value;
  const end_date=document.getElementById('m-end').value;
  const status=document.getElementById('m-status').value;
  if(!label||!start_date||!end_date)return;
  setSyncStatus('Salvando...');
  try {
    const p=projects.find(x=>x.id===pid);
    if(sid){
      const u=await apiFetch(`/segments/${sid}`,{method:'PUT',body:JSON.stringify({label,start_date,end_date,status})});
      u.start_date=fixDate(u.start_date); u.end_date=fixDate(u.end_date);
      p.segments=p.segments.map(s=>s.id===sid?u:s);
    } else {
      const c=await apiFetch(`/projects/${pid}/segments`,{method:'POST',body:JSON.stringify({label,start_date,end_date,status})});
      c.start_date=fixDate(c.start_date); c.end_date=fixDate(c.end_date);
      p.segments.push(c);
    }
    closeModal(); calRender(); toast('Bloco salvo.');
  } catch(e){toast(e.message,true);}
  setSyncStatus('');
}
async function deleteSeg(pid,sid) {
  setSyncStatus('Salvando...');
  try {
    await apiFetch(`/segments/${sid}`,{method:'DELETE'});
    const p=projects.find(x=>x.id===pid);
    p.segments=p.segments.filter(s=>s.id!==sid);
    closeModal(); calRender(); toast('Bloco excluído.');
  } catch(e){toast(e.message,true);}
  setSyncStatus('');
}

function scopeRenderList() {

async function selectScopeProject(pid) {

}

async function scopeLoadAndRender(pid) {
  document.getElementById('scope-detail').innerHTML='<div class="state-msg">Carregando...</div>';
  try {
    const data=await apiFetch(`/scopes/${pid}`);
    const idx=scopes.findIndex(s=>s.project_id===pid);
    if(idx>=0)scopes[idx]=data; else scopes.push(data);
    scopeRenderDetail();
  } catch(e){document.getElementById('scope-detail').innerHTML=`<div class="error-msg">${e.message}</div>`;}
}

function getScopeData(pid) { return scopes.find(s=>s.project_id===pid)||null; }

function scopeSearchFilter(q) {
  const data=getScopeData(currentScopeProject);

        <button class="add-row-btn" onclick="seAddRisk()">+ Adicionar risco</button>
      </div>

      <div class="divider"></div>

      <div style="display:flex;justify-content:flex-end;gap:8px;padding-top:4px">
        <button class="btn btn-danger" onclick="scopeCancelEdit()">Cancelar</button>
        <button class="btn btn-primary" onclick="scopeSaveEdit()">✓ Salvar alterações</button>
      </div>
    </div>`;
}

function seObj(i,k,v){scopeEditState.objectives[i][k]=v;}
function seRemoveObj(i){scopeEditState.objectives.splice(i,1);scopeRenderEdit();}
function seAddObj(){scopeEditState.objectives.push({done:false,text:''});scopeRenderEdit();setTimeout(()=>{const els=document.querySelectorAll('.obj-edit-row input[type=text]');if(els.length)els[els.length-1].focus();},50);}
function seRisk(i,k,v){scopeEditState.risks[i][k]=v;}
function seRemoveRisk(i){scopeEditState.risks.splice(i,1);scopeRenderEdit();}
function seAddRisk(){scopeEditState.risks.push({nivel:'medio',text:''});scopeRenderEdit();setTimeout(()=>{const els=document.querySelectorAll('.risk-edit-row input[type=text]');if(els.length)els[els.length-1].focus();},50);}

async function scopeSaveEdit() {
  setSyncStatus('Salvando...');
  const es=scopeEditState;
  try {
    await apiFetch(`/scopes/${currentScopeProject}`,{method:'PUT',body:JSON.stringify({
      descricao:es.descricao,responsavel:es.responsavel,cliente:es.cliente,
      prioridade:es.prioridade,status:es.status,progresso:es.progresso,
      orc_total:es.orc_total,orc_gasto:es.orc_gasto,
      objectives:es.objectives,risks:es.risks,
    })});
    scopeEditing=false;
    await scopeLoadAndRender(currentScopeProject);
    scopeRenderList();
    toast('Escopo salvo.');
  } catch(e){toast(e.message,true);}
  setSyncStatus('');
}

function scopeCancelEdit(){scopeEditing=false;scopeRenderDetail();}

// ── MODAL UTIL ──
function modal(title,body,actions){
  document.getElementById('modal-box').innerHTML=`<div class="modal-title">${title}</div>${body}<div class="modal-actions">${actions}</div>`;
  document.getElementById('overlay').classList.add('open');
}
function closeModal(){document.getElementById('overlay').classList.remove('open');}

// ── UTILS ──
function toast(msg,err=false){
  const t=document.getElementById('toast');
  t.textContent=msg; t.className='toast'+(err?' err':''); t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2800);
}
function setSyncStatus(msg){document.getElementById('sync-status').textContent=msg;}

document.getElementById('overlay').addEventListener('click',e=>{if(e.target===document.getElementById('overlay'))closeModal();});
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal();});

initYearSelectors();
checkAuth();

</script>
</body>
</html>
